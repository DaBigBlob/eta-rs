<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Primary SEO -->
     <title>Eta WASM</title>
    <meta name="description" content="Evaluate ETA expressions in the browser (WASM)." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://0xe.io/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Theme color -->
    <meta name="theme-color" content="#0b0c0f" />

    <!-- Open Graph (social embedding) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eta" />
    <meta property="og:description" content="Evaluate ETA expressions in the browser (WASM)." />
    <meta property="og:url" content="https://0xe.io/" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Eta" />
    <meta name="twitter:description" content="Evaluate ETA expressions in the browser (WASM)." />

    <style>
      :root {
        color-scheme: light dark;
        font: 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }

      .wrap {
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 0px;
      }

      #in, #out {
        width: 100%;
        height: 100%;
        resize: none;
        padding: 12px;
      }

      #out { cursor: pointer; }
      #out:active { opacity: 0.9; }

      /* top bar style */
      .right_panl {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .topbar {
        padding: 0px 12px 0 12px;
        text-align: center;
        font-size: 12px;
      }
      .topbar a {
        color: inherit;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="background-color: black; position: fixed; inset: 0; display: grid; place-items: center;">
        This page requires JavaScript to work. Unbased I know, but this is the state of WASM right now.
      </div>
    </noscript>

    <div class="wrap">
      <textarea id="in" spellcheck="false" placeholder="Eta s-expression (s-pair) here.">
; THIS IS LAMBDA CALCULUS EXAMPLE
;a comment starts with ; and continues to end of line
((E ((A A) E)) ;external capture of eta and omicron

(E (; invoking eta
(P ;capturing lambda application implementation from below
;<---lambda expression begin--->

;NOTE: as we have described,
;   application is of form (E (P (<lambda abstraction>  <applicand>)))
;   abstraction is of form (A (<binding variabel> <body>))
;NOTE: alpha renaming is not a real thing, make sure to name accordingly

;;;;;;;omega combinator;;;;;;;;
;uncomment the following to make your stack overflow ☺️
;; (E (P (
;; (A (y (E (P (y y)))))
;; (A (y (E (P (y y)))))
;; )))

; make 4 of the virus 🦠
(E(P ((A (v ((v v) (v v)))) 🦠)))

;<---lambda expression end--->
)

(;this is the lambda application implementation to be used as P
((A (n b)) x)
(E ((n b) x))
)

)))
      </textarea>
      <div class="right_panl">
        <div class="topbar">
          This UI: <a href="https://github.com/DaBigBlob/eta-rs" target="_blank" rel="noopener">https://github.com/DaBigBlob/eta-rs</a> &nbsp; Eta: <a href="https://github.com/DaBigBlob/eta-core" target="_blank" rel="noopener">https://github.com/DaBigBlob/eta-core</a>
        </div>
        <textarea id="out" spellcheck="false" readonly placeholder="Click/Tap here to run."></textarea>
      </div>
    </div>

    <script type="module">
      if (typeof WebAssembly === "undefined") {
        document.body.innerHTML = `
          <div style="background-color: black; position: fixed; inset: 0; display: grid; place-items: center;">
            This browser does not support WebAssembly. Try a newer Safari/Chrome/Firefox/Edge.
          </div>`;
      } else {
        const { default: init, eta_runner } = await import("./eta.js");
        await init();

        const $in = document.getElementById("in");
        const $out = document.getElementById("out");
        $out.onclick = () => { $out.value = eta_runner($in.value); };
      }
    </script>
  </body>
</html>
