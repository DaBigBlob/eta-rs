<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ETA REPL</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 24px; }
      textarea { width: 100%; height: 6em; font: 14px ui-monospace, monospace; padding: 10px; }
      pre { white-space: pre-wrap; font: 14px ui-monospace, monospace; border: 1px solid #ddd; padding: 12px; }
      button { padding: 8px 12px; }
      .row { display: flex; gap: 10px; margin: 10px 0; }
    </style>
  </head>
  <body>
    <div class="row">
      <button id="run">Run</button>
      <button id="clear">Clear</button>
    </div>
    <pre id="out"></pre>
    <textarea id="in" placeholder="Expression (Enter to run, Shift+Enter for newline)"></textarea>


    <script type="module">
      import init, { greet_me, eta_runner } from "./eta.js";

      const $in = document.getElementById("in");
      const $out = document.getElementById("out");

      function println(s) {
        $out.textContent += s + "\n";
      }

      function run() {
        const src = $in.value;
        if (!src.trim()) return;
        println("> " + src);
        try {
          println(eta_runner(src));
        } catch (e) {
          println("!! Error: " + (e?.message ?? String(e)));
        }
        $in.value = "";
        $in.focus();
      }

      document.getElementById("run").onclick = run;
      document.getElementById("clear").onclick = () => { $out.textContent = ""; $in.focus(); };

      $in.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" && !ev.shiftKey) {
          ev.preventDefault();
          run();
        }
      });

      await init();

      println("READY.");
      $in.focus();
    </script>
  </body>
</html>
